  // 3. ホーム画面に追加していない場合に案内を表示（iOS Safari向け）
  function isInStandaloneMode() {
    return ('standalone' in window.navigator) && (window.navigator.standalone);
  }
  function isIOS() {
    return /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
  }

  function showInstallHint() {
    if (isInStandaloneMode()) return; // すでにホーム画面から起動している
    if (localStorage.getItem('pwa_install_hint_dismissed')) return;
    if (!isIOS()) return; // 今回はiOS Safari向けの案内のみ実装

    const hint = document.createElement('div');
    hint.id = 'pwa-install-hint';
    hint.style = `
      position: fixed; left: 16px; right: 16px; bottom: 56px;
      background: white; border: 2px solid ${PWA_THEME_COLOR};
      border-radius: 16px; padding: 14px 16px; z-index: 10000;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      font-family: 'Zen Maru Gothic', sans-serif;
      display: flex; align-items: center; gap: 10px;
    `;
    hint.innerHTML = `
      <div style="flex:1; font-size:12px; line-height:1.6; color:#1c1c1a;">
        <strong>📲 ホーム画面に追加</strong>すると、アプリのように使えます。<br>
        下の<strong>共有ボタン</strong>（□と↑）→「ホーム画面に追加」をタップ。
      </div>
      <button id="pwa-hint-close" style="background:none;border:none;font-size:18px;cursor:pointer;color:#9ca3af;flex-shrink:0;">✕</button>
    `;
    document.body.appendChild(hint);
    document.getElementById('pwa-hint-close').onclick = function() {
      hint.remove();
      localStorage.setItem('pwa_install_hint_dismissed', 'true');
    };
  }

  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(showInstallHint, 2000);
  });
})();

</script>
<style>:root {
  --white: #ffffff;
  --off-white: #f8f8f6;
  --ink: #3f3f46;
  --gray: #6b6b68;
  --light-gray: #e8e8e4;

  --grade1-accent: #d97706;
  --grade1-bg: #fffbeb;
  --grade2-accent: #b45309;
  --grade2-bg: #fffbeb;
  --grade3-accent: #92400e;
  --grade3-bg: #fffbeb;

  --coral: #ff5e5b;
  --mint: #00c9a7;
  --yellow: #ffe135;
  --sky: #5bc8f5;
  --lavender: #a78bfa;

  --cur-accent: var(--grade1-accent);
  --cur-bg: var(--grade1-bg);

  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 3px 3px 0 var(--ink);
  --shadow-sm: 2px 2px 0 var(--ink);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'M PLUS Rounded 1c', 'Zen Maru Gothic', sans-serif;
  background: var(--off-white);
  color: var(--ink);
  min-height: 100vh;
}
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

.app-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: #1c1c1a;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--cur-accent);
}
.back-btn {
  background: none; border: 2px solid rgba(255,255,255,0.6); color: #ffffff;
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 0.1em; padding: 5px 12px; cursor: pointer;
  border-radius: 100px; transition: all 0.15s; flex-shrink: 0;
}
.back-btn:hover { border-color: #fde68a; color: #fde68a; }
.header-title {
  font-family: 'M PLUS Rounded 1c', 'Zen Maru Gothic', sans-serif; font-size: 19px; font-weight: 700;
  color: #ffffff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.header-badge {
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
  padding: 4px 10px; border-radius: 100px; background: #fde68a; color: #1c1c1a; flex-shrink: 0;
}

/* HOME */
#screen-home {
  background: linear-gradient(160deg, #fffbeb 0%, #fef3c7 100%);
  padding: 28px 16px 40px; align-items: center;
}
.home-logo { text-align: center; max-width: 520px; width: 100%; margin-bottom: 28px; }
.home-icon { font-size: 48px; display: block; margin-bottom: 10px; }
.home-series {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.4em; color: #92400e; text-transform: uppercase; margin-bottom: 10px;
}
.home-title {
  font-size: clamp(30px,7vw,50px); font-weight: 900; color: #1c1c1a; line-height: 1.2; margin-bottom: 6px;
}
.home-title span { color: #92400e; }
.home-sub { font-size: 16px; color: #1c1c1a; font-weight: 700; background:#fde68a; display:inline-block; padding:4px 14px; border-radius:100px; margin-top:6px; }

.grade-section-label {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.3em; color: #1c1c1a; background:white; padding:4px 12px; border-radius:100px;
  max-width: 520px; width: 100%; margin-bottom: 10px; text-align:center;
}
.grade-grid { display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 520px; width: 100%; }
.grade-card {
  border: 2.5px solid #92400e; border-radius: var(--radius); padding: 18px 18px;
  cursor: pointer; position: relative; overflow: hidden; transition: all 0.15s;
  background: white; display:flex; align-items:center; gap:14px; box-shadow: var(--shadow-sm);
}
.grade-card:hover { border-color: #92400e; transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.grade-card.selected { border-color: var(--yellow) !important; box-shadow: 0 0 0 1px var(--yellow); }
.grade-card.locked { opacity: 0.5; cursor: not-allowed; }
.grade-icon { font-size: 32px; flex-shrink:0; }
.grade-info { flex:1; }
.grade-name { font-size: 18px; font-weight: 900; color: #1c1c1a; line-height: 1.2; margin-bottom: 2px; }
.grade-sub { font-size: 12px; color: var(--gray); line-height: 1.4; }
.grade-lock-badge {
  font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 700;
  background: #f3f4f6; color: #9ca3af; padding: 3px 8px; border-radius: 100px;
}

.start-btn-wrap { max-width: 520px; width: 100%; margin-top: 14px; }
.start-btn {
  width: 100%; padding: 16px; background: #fde68a; border: none; color: #1c1c1a;
  font-family: 'M PLUS Rounded 1c', 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 900;
  border-radius: var(--radius); cursor: pointer; box-shadow: 3px 3px 0 rgba(255,225,53,0.4); transition: all 0.15s;
}
.start-btn:hover { transform: translate(-1px,-1px); }

/* HUB */
#screen-hub { background: var(--off-white); }
.hub-body { padding: 20px 16px 70px; max-width: 580px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 14px; }
.hub-hero { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border: 2.5px solid #92400e; border-radius: var(--radius); padding: 24px 20px; position: relative; overflow: hidden; }
.hub-grade-icon { font-size: 36px; display: block; margin-bottom: 10px; }
.hub-grade-title { font-size: clamp(22px,5vw,32px); font-weight: 900; color: #1c1c1a; line-height: 1.2; margin-bottom: 6px; }
.hub-grade-title span { color: #92400e; }
.hub-grade-sub { font-size: 16px; color: var(--gray); font-weight: 700; }

.hub-mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.hub-mode-btn { background: white; border: 2.5px solid var(--ink); border-radius: var(--radius); padding: 16px 12px; cursor: pointer; text-align: center; box-shadow: var(--shadow-sm); transition: all 0.15s; }
.hub-mode-btn:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.hub-mode-btn.primary { background: var(--cur-accent); border-color: var(--cur-accent); color: white; }
.hub-mode-icon { font-size: 24px; display: block; margin-bottom: 6px; }
.hub-mode-label { font-size: 16px; font-weight: 900; display: block; margin-bottom: 2px; }
.hub-mode-desc { font-size: 14px; color: var(--gray); line-height: 1.4; }
.hub-mode-btn.primary .hub-mode-desc { color: rgba(255,255,255,0.8); }

.hub-progress-wrap { background: white; border: 2.5px solid var(--ink); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); }
.hub-progress-label { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.2em; color: #0f766e; text-transform: uppercase; margin-bottom: 8px; }
.hub-dots { display: flex; gap: 6px; flex-wrap: wrap; }
.hub-dot { width: 28px; height: 28px; border: 2px solid var(--light-gray); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; color: var(--gray); cursor: pointer; transition: all 0.2s; }
.hub-dot.read { background: var(--cur-accent); border-color: var(--cur-accent); color: white; }
.hub-dot.quiz-done { background: var(--coral); border-color: var(--coral); color: white; }

/* EPISODE LIST */
#screen-list { background: var(--off-white); }
.ep-list-body { padding: 12px 16px 70px; max-width: 580px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 6px; }
.ep-card { background: white; border: 2.5px solid var(--ink); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; box-shadow: var(--shadow-sm); transition: all 0.1s; display: flex; align-items: center; gap: 12px; }
.ep-card:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.ep-card.read { background: var(--off-white); }
.ep-num { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--cur-accent); min-width: 36px; letter-spacing: 0.05em; }
.ep-info { flex: 1; }
.ep-card-title { font-size: 18px; font-weight: 900; color: var(--ink); margin-bottom: 2px; }
.ep-card-sub { font-size: 15px; color: var(--gray); }
.ep-badge { font-size: 16px; }

/* READER */
#screen-reader { background: var(--off-white); }
.lang-toggle-btn { background: #fde68a; border: 2px solid var(--ink); color: var(--ink); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; padding: 6px 14px; border-radius: 100px; cursor: pointer; box-shadow: 2px 2px 0 var(--ink); transition: all 0.15s; flex-shrink: 0; }
.lang-toggle-btn:hover { transform: translate(-1px,-1px); }
.quiz-trigger-btn { background: #f87171; border: none; color: white; font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 6px 14px; border-radius: 100px; cursor: pointer; box-shadow: 2px 2px 0 rgba(255,94,91,0.4); transition: all 0.15s; flex-shrink: 0; }

.manga-content { max-width: 680px; margin: 0 auto; padding: 16px 16px 70px; width: 100%; }
.manga-wrap { display: flex; flex-direction: column; gap: 4px; }

.m-cover { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); border: 2.5px solid #92400e; border-radius: var(--radius); padding: 32px 24px 24px; position: relative; overflow: hidden; margin-bottom: 4px; }
.m-cover-series { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.35em; color:#92400e; text-transform:uppercase; margin-bottom:10px; }
.m-cover-ep { display:inline-block; background:var(--yellow); color:var(--ink); font-family:'Syne',sans-serif; font-size:12px; font-weight:800; letter-spacing:0.15em; padding:3px 12px; border-radius:100px; margin-bottom:12px; }
.m-cover-title { font-size:clamp(26px,5vw,42px); font-weight:900; color:#3f3f46; line-height:1.2; margin-bottom:8px; position:relative; z-index:1; }
.m-cover-title .hl { color:#92400e; }
.m-cover-sub { font-size:16px; font-weight:700; color:#374151; border-left:3px solid var(--coral); padding-left:10px; position:relative; z-index:1; }

.m-page { display:flex; flex-direction:column; gap:4px; }
.m-panel { background:white; border-radius:var(--radius); border:2px solid #e4e4e7; box-shadow:none; overflow:hidden; position:relative; }
.m-panel-inner { padding:16px; display:flex; flex-direction:column; gap:10px; }

.m-narr { background:#4f46e5; color:white; font-size:16px; font-weight:700; line-height:1.7; padding:8px 14px; border-radius:var(--radius-sm); align-self:flex-start; }
.m-narr.accent { background: var(--mint); color: var(--ink); }
.m-narr.tone { background: var(--cur-accent); color: white; }
.m-narr.right { align-self:flex-end; }

.m-scene { position:absolute; top:0; left:0; background:var(--coral); color:white; font-size:13px; font-weight:700; letter-spacing:0.15em; padding:4px 12px; border-radius:0 0 var(--radius-sm) 0; }

.m-bubble-wrap { display:flex; align-items:flex-start; gap:8px; }
.m-bubble-wrap.right { flex-direction:row-reverse; }
.m-char-col { display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; }
.m-char-icon { width:52px; height:52px; border-radius:50%; border:2.5px solid var(--ink); display:flex; align-items:center; justify-content:center; font-size:26px; }
.m-char-icon.a { background:#fde8d8; }
.m-char-icon.b { background:#dbeafe; }
.m-char-name { font-size:13px; font-weight:700; color:var(--gray); text-align:center; white-space:nowrap; }

.m-bubble { background:#fafafa; border:2px solid #d4d4d8; border-radius:14px; padding:12px 16px; font-size:18px; line-height:1.7; font-weight:600; color:#3f3f46; max-width:calc(100% - 62px); position:relative; box-shadow:var(--shadow-sm); }
.m-bubble .jp-line { display:block; font-size:14px; font-weight:400; color:#6b7280; margin-top:5px; border-top: 1px dashed #d1d5db; padding-top: 5px; }
.m-bubble.jp-hidden .jp-line { display: none; }
.m-bubble::before { content:''; position:absolute; top:13px; left:-8px; border:5px solid transparent; border-right-color:var(--ink); }
.m-bubble::after { content:''; position:absolute; top:14px; left:-5px; border:4px solid transparent; border-right-color:white; }
.m-bubble-wrap.right .m-bubble::before { left:auto; right:-8px; border-right-color:transparent; border-left-color:var(--ink); }
.m-bubble-wrap.right .m-bubble::after { left:auto; right:-5px; border-right-color:transparent; border-left-color:white; }

.m-grammar-box { background: #fffbeb; border: 2.5px solid #92400e; border-radius: var(--radius); padding: 18px 20px; position: relative; overflow: hidden; }

.m-grammar-label { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.3em; color:#92400e; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.m-grammar-label::before { content:''; display:block; width:16px; height:2px; background:#92400e; }
.m-grammar-pattern { background: white; border: 2px dashed #92400e; border-radius: 10px; padding: 14px 18px; font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 700; color: #92400e; text-align: center; margin-bottom: 12px; }
.m-grammar-text { font-size:17px; line-height:1.9; color:#1c1c1a; font-weight:400; position:relative; z-index:1; }
.m-grammar-text strong { color: #92400e; font-weight: 900; }
.m-grammar-text .ex { display: block; background: white; border: 1.5px solid #92400e; border-radius: 8px; padding: 10px 14px; margin: 8px 0; font-family: 'M PLUS Rounded 1c', 'Zen Maru Gothic', sans-serif; font-size: 15px; line-height: 1.8; }

.m-vocab-box { background: #fffbeb; border: 2.5px solid #92400e; border-radius: var(--radius); padding: 16px 18px; }
.m-vocab-label { font-size: 12px; font-weight: 700; color: #c2410c; letter-spacing: 0.15em; margin-bottom: 10px; }
.m-vocab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.m-vocab-item { font-size: 15px; font-weight: 600; color: #3f3f46; }
.m-vocab-item .jp { color: #c2410c; font-weight: 400; font-size: 14px; }

.m-footer { background: #b45309; border-radius: var(--radius); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; margin-top: 4px; transition: all 0.15s; }
.m-footer:hover { background: #92400e; transform: translate(-1px,-1px); box-shadow: 2px 2px 0 var(--ink); }
.m-footer-next { font-size: 15px; font-weight: 900; color: white; }
.m-footer-num { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.85); }

/* QUIZ */
#screen-quiz { background: var(--off-white); }
#screen-quiz .app-header { background: var(--coral); border-bottom-color: #c0392b; }
.quiz-body { padding: 16px 16px 70px; max-width: 580px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; }
.quiz-prog-bar { display:flex; gap:4px; margin-bottom:16px; }
.quiz-pd { flex:1; height:4px; background:var(--light-gray); border-radius:2px; transition:background 0.3s; }
.quiz-pd.done { background:var(--coral); }
.quiz-pd.current { background:var(--cur-accent); }
.quiz-ep-label { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.15em; color:#92400e; text-transform:uppercase; margin-bottom:8px; }
.quiz-question { background:#fafafa; border:2.5px solid #d4d4d8; border-radius:var(--radius); padding:18px; box-shadow:none; font-size:19px; font-weight:700; color:#3f3f46; line-height:1.7; margin-bottom:14px; }
.quiz-options { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
.quiz-option { background:white; border:2px solid #d4d4d8; border-radius:var(--radius); padding:16px 18px; font-size:16px; font-weight:600; color:#3f3f46; text-align:left; cursor:pointer; box-shadow:none; transition:all 0.15s; font-family:'Zen Maru Gothic',sans-serif; }
.quiz-option:hover:not(:disabled) { border-color: var(--cur-accent); background:#fafafa; }
.quiz-option.correct { background:#dcfce7; border-color:#16a34a; box-shadow:2px 2px 0 #16a34a; }
.quiz-option.wrong { background:#fee2e2; border-color:var(--coral); box-shadow:2px 2px 0 var(--coral); }
.quiz-option:disabled { cursor:default; transform:none; }
.quiz-feedback { display:none; padding:14px 16px; border:2.5px solid var(--ink); border-radius:var(--radius); font-size:15px; font-weight:700; line-height:1.7; margin-bottom:12px; }
.quiz-feedback.show { display:block; }
.quiz-feedback.correct-fb { background:#dcfce7; border-color:#16a34a; }
.quiz-feedback.wrong-fb { background:#fee2e2; border-color:var(--coral); }
.quiz-next-btn { background:var(--ink); border:none; color:white; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.1em; padding:13px 22px; border-radius:100px; cursor:pointer; box-shadow:2px 2px 0 var(--cur-accent); align-self:flex-end; display:none; transition:all 0.15s; }
.quiz-next-btn.show { display:block; }
.quiz-next-btn:hover { transform:translate(-1px,-1px); }
.quiz-result { display:none; flex-direction:column; align-items:center; padding:28px 16px; text-align:center; gap:12px; }
.quiz-result.show { display:flex; }
.result-stamp { font-size:52px; animation:stampIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes stampIn { from{transform:scale(3);opacity:0} to{transform:scale(1);opacity:1} }
.result-score { font-family:'Syne',sans-serif; font-size:64px; font-weight:800; color:#ef4444; line-height:1; }
.result-label { font-size:20px; font-weight:900; color:var(--ink); }
.result-sub { font-size:16px; color:var(--gray); line-height:1.7; }
.result-btns { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:4px; }
.result-btn { border:2.5px solid var(--ink); background:white; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.1em; padding:11px 20px; border-radius:100px; cursor:pointer; box-shadow:var(--shadow-sm); transition:all 0.15s; }
.result-btn:hover { transform:translate(-1px,-1px); box-shadow:var(--shadow); }
.result-btn.primary { background:var(--ink); color:white; border-color:var(--cur-accent); box-shadow:2px 2px 0 var(--cur-accent); }

@media(max-width:480px) {
  .m-vocab-grid { grid-template-columns: 1fr; }
}
.panel, .m-cover, .m-grammar-box { animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* SPEAK BUTTON */
.speak-btn {
  display: inline-flex; align-items: center; justify-content: center;
  margin-top: 8px; margin-left: 2px;
  width: 32px; height: 32px;
  background: #fffbeb; border: 1.5px solid #92400e;
  border-radius: 50%; font-size: 14px;
  cursor: pointer; transition: all 0.15s;
  vertical-align: middle;
}
.speak-btn:hover { background: #dbeafe; transform: scale(1.1); }
.speak-btn.speaking {
  background: #2563eb; border-color: #1d4ed8;
  animation: pulse-speak 0.8s ease-in-out infinite;
}
@keyframes pulse-speak {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* GRAMMAR HIGHLIGHT */
.grammar-hl {
  color: #dc2626;
  font-weight: 900;
  border-bottom: 2px solid #fca5a5;
  padding-bottom: 1px;
}

/* SHORT ANSWER (EXAM MODE) */
.short-answer-input {
  width: 100%;
  border: 2.5px solid var(--ink);
  border-radius: var(--radius);
  padding: 12px 14px;
  font-family: 'M PLUS Rounded 1c', 'Zen Maru Gothic', sans-serif;
  font-size: 15px;
  resize: vertical;
  margin-bottom: 8px;

<script>// ============================================================
// STATE
// ============================================================
let currentGradeId = 'g1';
let currentGrade = GRADES.find(g => g.id === 'g1');
let currentEpIdx = 0;
let readMap = JSON.parse(localStorage.getItem('shakaiReadMap') || '{}');
let quizMap = JSON.parse(localStorage.getItem('shakaiQuizMap') || '{}');
let currentQuiz = [];
let currentQuizIdx = 0;
let quizScore = 0;
let lastQuizGradeId = '';
let lastQuizEpIdx = 0;

// ============================================================
// INIT HOME
// ============================================================
function applyGradeTheme(grade) {
  const r = document.documentElement.style;
  r.setProperty('--cur-accent', `var(--${grade.cls}-accent)`);
  r.setProperty('--cur-bg', `var(--${grade.cls}-bg)`);
}

function initGradeGrid() {
  const grid = document.getElementById('grade-grid');
  grid.innerHTML = GRADES.map(grade => {
    const readCount = (readMap[grade.id] || []).length;
    const total = grade.episodes.length;
    const locked = grade.locked;
    return `<div class="grade-card ${locked?'locked':''} ${grade.id===currentGradeId?'selected':''}" onclick="${locked?'':`selectGrade('${grade.id}')`}">
      <span class="grade-icon">${grade.icon}</span>
      <div class="grade-info">
        <div class="grade-name">${grade.name}</div>
        <div class="grade-sub">${grade.sub}${readCount>0?` ／ 📖 ${readCount}/${total}単元`:''}</div>
      </div>
      ${locked?'<div class="grade-lock-badge">準備中</div>':''}
    </div>`;
  }).join('');
}

function selectGrade(id) {
  currentGradeId = id;
  currentGrade = GRADES.find(g => g.id === id);
  applyGradeTheme(currentGrade);
  document.querySelectorAll('.grade-card').forEach(c => c.classList.remove('selected'));
  initGradeGrid();
  document.getElementById('start-btn').textContent = `「${currentGrade.name}」で学ぶ ▶`;
}

function goToHub() {
  renderHub();
  showScreen('hub');
}

// ============================================================
// HUB
// ============================================================
function renderHub() {
  const grade = currentGrade;
  document.getElementById('hub-header-title').textContent = grade.name;
  document.getElementById('hub-icon').textContent = grade.icon;
  document.getElementById('hub-title').innerHTML = `${grade.icon} ${grade.name}<span>を学ぶ</span>`;
  document.getElementById('hub-sub').textContent = grade.sub;

  const read = readMap[grade.id] || [];
  const quiz = quizMap[grade.id] || {};
  const dots = document.getElementById('hub-dots');
  dots.innerHTML = grade.episodes.map((ep, i) => {
    const isRead = read.includes(i);
    const hasQuiz = quiz[i] !== undefined;
    const cls = hasQuiz ? 'quiz-done' : isRead ? 'read' : '';
    return `<div class="hub-dot ${cls}" onclick="readEp(${i})" title="${ep.keyword}">${i+1}</div>`;
  }).join('');

  document.getElementById('hub-prog-label').textContent = `📖 ${read.length}/${grade.episodes.length}単元学習済み`;

  const examBtn = document.getElementById('exam-mode-btn');
  if (grade.exam) { examBtn.style.display = ''; }
  else { examBtn.style.display = 'none'; }
}

// ============================================================
// EPISODE LIST
// ============================================================
function showEpList() {
  const grade = currentGrade;
  const read = readMap[grade.id] || [];
  const quiz = quizMap[grade.id] || {};
  const body = document.getElementById('ep-list-body');
  body.innerHTML = grade.episodes.map((ep, i) => {
    const isRead = read.includes(i);
    const score = quiz[i];
    const badge = score !== undefined ? '✅' : isRead ? '📖' : '';
    return `<div class="ep-card ${isRead?'read':''}" onclick="readEp(${i})">
      <div class="ep-num">単元${String(ep.id).padStart(2,'0')}</div>
      <div class="ep-info">
        <div class="ep-card-title">${ep.title}</div>
        <div class="ep-card-sub">${ep.subtitle}${score!==undefined?' ／ クイズ '+score+'/3点':''}</div>
      </div>
      <div class="ep-badge">${badge}</div>
    </div>`;
  }).join('');
  showScreen('list');
}

// ============================================================
// READER
// ============================================================
function readEp(idx) {
  currentEpIdx = idx;
  const ep = currentGrade.episodes[idx];
  document.getElementById('reader-title').textContent = `🌏 単元${ep.id} ${ep.keyword}`;
  document.getElementById('manga-content').innerHTML = buildLessonHtml(ep);
  if (!readMap[currentGradeId]) readMap[currentGradeId] = [];
  if (!readMap[currentGradeId].includes(idx)) {
    readMap[currentGradeId].push(idx);
    localStorage.setItem('shakaiReadMap', JSON.stringify(readMap));
  }
  showScreen('reader');
  document.getElementById('screen-reader').scrollTop = 0;
}

// ============================================================
// LESSON HTML BUILDER
// ============================================================
function buildLessonHtml(ep) {
  const c1 = ep.char1, c2 = ep.char2;
  const vocabHtml = ep.vocab.map(([term,desc]) => `<div class="m-vocab-item">${term}<br><span class="jp">${desc}</span></div>`).join('');
  return `<div class="manga-wrap">
  <div class="m-cover">
    <div class="m-cover-series">${currentGrade.name} 社会ストーリー</div>
    <div class="m-cover-ep">🌏 単元${ep.id}</div>
    <div class="m-cover-title">${ep.title}</div>
    <div class="m-cover-sub">${ep.subtitle}</div>
  </div>

  <div class="m-page">
    <div class="m-panel"><div class="panel-inner m-panel-inner">
      <div class="m-narr">今日のテーマ：<strong>${ep.keyword}</strong></div>
      <div class="m-narr accent right">先生と一緒に世界と日本のしくみを学ぼう！</div>
    </div></div>

    <div class="m-panel">
      <div class="m-scene">${ep.scene}</div>
      <div class="m-panel-inner" style="padding-top:36px">
        <div class="m-bubble-wrap">
          <div class="m-char-col"><div class="m-char-icon a">${c1.icon}</div><div class="m-char-name">${c1.name}</div></div>
          <div class="m-bubble">${c1.line}</div>
        </div>
        <div class="m-bubble-wrap right">
          <div class="m-char-col"><div class="m-char-icon b">${c2.icon}</div><div class="m-char-name">${c2.name}</div></div>
          <div class="m-bubble">${c2.line}</div>
        </div>
      </div>
    </div>

    <div class="m-grammar-box">
      <div class="m-grammar-label">${ep.conceptLabel}</div>
      <div class="m-grammar-pattern">${ep.conceptPattern}</div>
      <div class="m-grammar-text">${ep.conceptText}</div>
    </div>

    <div class="m-vocab-box">
      <div class="m-vocab-label">📒 重要な社会用語</div>
      <div class="m-vocab-grid">${vocabHtml}</div>
    </div>
  </div>

  <div class="m-footer" onclick="startQuizForCurrentEp()" style="cursor:pointer">
    <div class="m-footer-next">クイズで「${ep.keyword}」を確認しよう！ ▶</div>
    <div class="m-footer-num">単元${ep.id} / 了</div>
  </div>
</div>`;
}

// ============================================================
// QUIZ
// ============================================================
function startQuizForCurrentEp() { startQuiz(currentGradeId, currentEpIdx); }
function startRandomQuiz() { startQuiz(currentGradeId, Math.floor(Math.random()*currentGrade.episodes.length)); }

function startQuiz(gradeId, epIdx) {
  lastQuizGradeId = gradeId;
  lastQuizEpIdx = epIdx;
  const grade = GRADES.find(g=>g.id===gradeId);
  const ep = grade.episodes[epIdx];
  currentQuiz = [...ep.quiz];
  currentQuizIdx = 0;
  quizScore = 0;
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id => { document.getElementById(id).style.display=''; });
  document.getElementById('quiz-result').className = 'quiz-result';
  document.getElementById('quiz-ep-label').textContent = `🧪 ${grade.name} 単元${ep.id} 「${ep.keyword}」`;
  renderQuestion();
  showScreen('quiz');
}

function renderQuestion() {
  const q = currentQuiz[currentQuizIdx];
  document.getElementById('quiz-prog-bar').innerHTML =
    currentQuiz.map((_,i)=>`<div class="quiz-pd ${i<currentQuizIdx?'done':i===currentQuizIdx?'current':''}"></div>`).join('');
  document.getElementById('quiz-question').textContent = q.q;

  if (q.type === 'short') {
    document.getElementById('quiz-options').innerHTML = `
      <textarea id="short-answer-input" class="short-answer-input" placeholder="自分の言葉で説明してみよう（記述問題）" rows="3"></textarea>
      <button class="quiz-option" style="text-align:center;font-weight:900" onclick="answerShort()">✏️ 解答を確認する</button>`;
  } else {
    document.getElementById('quiz-options').innerHTML =
      q.opts.map((o,i)=>`<button class="quiz-option" onclick="answer(${i})">${o}</button>`).join('');
  }
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-next-btn').className = 'quiz-next-btn';
}

function answerShort() {
  const q = currentQuiz[currentQuizIdx];
  const input = document.getElementById('short-answer-input');
  input.disabled = true;
  document.querySelector('#quiz-options .quiz-option').disabled = true;
  const fb = document.getElementById('quiz-feedback');
  fb.className = 'quiz-feedback correct-fb show';
  fb.innerHTML = `📝 模範解答：<strong>${q.ans}</strong><br>${q.exp}<br><span style="font-size:12px;color:#6b7280">※記述問題は自己採点です。考え方が合っていればOK！</span>`;
  quizScore++; // 記述は自己採点なので満点扱いでカウント（自分で判断）
  document.getElementById('quiz-next-btn').className='quiz-next-btn show';
}

function answer(chosen) {
  const q = currentQuiz[currentQuizIdx];
  document.querySelectorAll('.quiz-option').forEach(o=>o.disabled=true);
  const fb = document.getElementById('quiz-feedback');
  if (chosen===q.ans) {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('correct');
    fb.className='quiz-feedback correct-fb show';
    fb.innerHTML=`⭕ 正解！<br>${q.exp}`;
    quizScore++;
  } else {
    document.querySelectorAll('.quiz-option')[chosen].classList.add('wrong');
    document.querySelectorAll('.quiz-option')[q.ans].classList.add('correct');
    fb.className='quiz-feedback wrong-fb show';
    fb.innerHTML=`❌ 不正解。正解は「${q.opts[q.ans]}」<br>${q.exp}`;
  }
  document.getElementById('quiz-next-btn').className='quiz-next-btn show';
}

function nextQuestion() {
  currentQuizIdx++;
  if(currentQuizIdx>=currentQuiz.length) showResult();
  else renderQuestion();
}

function showResult() {
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id=>{ document.getElementById(id).style.display='none'; });
  const grade = GRADES.find(g=>g.id===lastQuizGradeId);
  const ep = grade.episodes[lastQuizEpIdx];
  if(!quizMap[lastQuizGradeId]) quizMap[lastQuizGradeId]={};
  quizMap[lastQuizGradeId][lastQuizEpIdx]=quizScore;
  localStorage.setItem('shakaiQuizMap',JSON.stringify(quizMap));
  const stamps=['😢','😅','😊','🎉'];
  const labels=['もう一度読んでみよう！','もう少し！','よくできました！','満点！パーフェクト！'];
  const si=quizScore===3?3:quizScore>=2?2:quizScore===1?1:0;
  document.getElementById('result-stamp').textContent=stamps[si];
  document.getElementById('result-score').textContent=`${quizScore}/3`;
  document.getElementById('result-label').textContent=labels[si];
  document.getElementById('result-sub').textContent=`${grade.name} 単元${ep.id}「${ep.keyword}」のクイズ結果`;
  document.getElementById('quiz-result').className='quiz-result show';
}

function retryQuiz() { startQuiz(lastQuizGradeId,lastQuizEpIdx); }

// ============================================================
// EXAM MODE (入試対策)
// ============================================================
function startExamMode(epIdx) {
  const grade = currentGrade;
  const examData = (grade.exam && grade.exam[epIdx+1]) ? grade.exam[epIdx+1] : null;
  if (!examData) { alert('この単元の入試対策問題は準備中です。'); return; }
  lastQuizGradeId = currentGradeId;
  lastQuizEpIdx = epIdx;
  currentQuiz = [...examData];
  currentQuizIdx = 0;
  quizScore = 0;
  ['quiz-question','quiz-options','quiz-feedback','quiz-next-btn','quiz-prog-bar','quiz-ep-label']
    .forEach(id => { document.getElementById(id).style.display=''; });
  document.getElementById('quiz-result').className = 'quiz-result';
  const ep = grade.episodes[epIdx];
  document.getElementById('quiz-ep-label').textContent = `📝 入試対策｜${grade.name} 単元${ep.id} 「${ep.keyword}」`;
  renderQuestion();
  showScreen('quiz');
}

function showExamList() {
  const grade = currentGrade;
  const body = document.getElementById('ep-list-body');
  body.innerHTML = grade.episodes.map((ep, i) => {
    const hasExam = grade.exam && grade.exam[i+1];
    return `<div class="ep-card ${hasExam?'':'locked'}" onclick="${hasExam?`startExamMode(${i})`:''}" style="${hasExam?'':'opacity:0.4;cursor:not-allowed'}">
      <div class="ep-num">単元${String(ep.id).padStart(2,'0')}</div>
      <div class="ep-info">
        <div class="ep-card-title">${ep.title}</div>
        <div class="ep-card-sub">${ep.keyword}${hasExam?' ／ 応用問題 '+grade.exam[i+1].length+'問':' ／ 準備中'}</div>
      </div>
      <div class="ep-badge">${hasExam?'📝':'🔒'}</div>
    </div>`;
  }).join('');
  showScreen('list');
}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(name) {
  initTrialSystem();
  if (!isContentAccessible() && name !== 'home') {
    showUnlockOverlay(PURCHASE_URL);
  }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='home') initGradeGrid();
  if(name==='hub') renderHub();
}

// ============================================================
selectGrade('g1');
initGradeGrid();
